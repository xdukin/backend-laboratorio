<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - Solos & Plantas</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; padding: 50px; text-align: center;}
        .box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; }
        input, button { padding: 12px; margin: 8px 0; width: 100%; box-sizing: border-box; }
        button { background-color: #4CAF50; color: white; border: none; font-weight: bold; cursor: pointer;}
        .btn-func { background-color: #2196F3; }
        .oculto { display: none; }
    </style>
</head>
<body>

<div class="box">
    <h1>Acesso ao Sistema</h1>
    <p id="msg-erro" style="color: red;"></p>

    <div id="escolha">
        <button onclick="mostrar('form-cliente')">Sou Cliente</button>
        <button class="btn-func" onclick="mostrar('form-func')">Sou Funcionário</button>
    </div>

    <div id="form-cliente" class="oculto">
        <h3>Login do Cliente</h3>
        <input type="text" id="cpf-login" placeholder="Digite seu CPF (Ex: 028.035.037-32)">
        <button onclick="loginCliente()">Entrar</button>
        <button style="background: #ccc; color: black;" onclick="mostrar('escolha')">Voltar</button>
    </div>

    <div id="form-func" class="oculto">
        <h3>Login do Funcionário</h3>
        <input type="text" id="token-login" placeholder="Digite seu Token (Ex: PA1406)">
        <button class="btn-func" onclick="loginFuncionario()">Entrar</button>
        <button style="background: #ccc; color: black;" onclick="mostrar('escolha')">Voltar</button>
    </div>
</div>

<script>
    function mostrar(id) {
        document.getElementById('escolha').classList.add('oculto');
        document.getElementById('form-cliente').classList.add('oculto');
        document.getElementById('form-func').classList.add('oculto');
        document.getElementById(id).classList.remove('oculto');
    }

    async function loginCliente() {
        const cpf = document.getElementById('cpf-login').value;
        const res = await fetch('http://localhost:3000/api/login/cliente', {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ cpf })
        });
        const data = await res.json();
        if(data.sucesso) {
            localStorage.setItem('token_lab', data.token);
            window.location.href = 'painel-cliente.html';
        } else {
            document.getElementById('msg-erro').innerText = data.mensagem;
        }
    }

    async function loginFuncionario() {
        const codigo = document.getElementById('token-login').value;
        const res = await fetch('http://localhost:3000/api/login/funcionario', {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ codigo })
        });
        const data = await res.json();
        if(data.sucesso) {
            localStorage.setItem('token_lab', data.token);
            window.location.href = 'painel-funcionario.html';
        } else {
            document.getElementById('msg-erro').innerText = data.mensagem;
        }
    }
</script>
</body>
</html>
